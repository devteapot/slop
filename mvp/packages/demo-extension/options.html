<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SLOP Extension Settings</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e1e4e8;
    max-width: 500px; margin: 40px auto; padding: 0 20px;
  }
  h1 { font-size: 20px; margin-bottom: 24px; }
  label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 4px; margin-top: 16px; }
  input, select {
    width: 100%; background: #161b22; border: 1px solid #30363d;
    color: #e1e4e8; padding: 10px; border-radius: 6px; font-size: 14px;
    font-family: inherit; box-sizing: border-box;
  }
  input:focus, select:focus { outline: none; border-color: #58a6ff; }
  .api-key-row { display: none; }
  .api-key-row.visible { display: block; }
  button {
    margin-top: 24px; background: #238636; color: #fff; border: none;
    padding: 10px 24px; border-radius: 6px; cursor: pointer;
    font-size: 14px; font-weight: 500;
  }
  button:hover { background: #2ea043; }
  .status { margin-top: 12px; font-size: 13px; color: #3fb950; }
  .status.error { color: #f85149; }
</style>
</head>
<body>
<h1>SLOP Extension Settings</h1>

<label>LLM Provider</label>
<select id="provider">
  <option value="ollama">Ollama (local)</option>
  <option value="openai">OpenAI-compatible API</option>
</select>

<label>API Endpoint</label>
<input type="text" id="endpoint" placeholder="http://localhost:11434">

<div class="api-key-row" id="apiKeyRow">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-...">
</div>

<label>Model</label>
<input type="text" id="model" placeholder="qwen2.5:14b">

<button id="save">Save</button>
<div class="status" id="status"></div>

<script src="dist/options.js"></script>
</body>
</html>
