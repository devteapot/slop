[package]
name = "slop-ai"
version = "0.1.0"
edition = "2021"
description = "Rust SDK for the SLOP protocol — let AI observe and interact with your app's state"
license = "MIT"
repository = "https://github.com/devteapot/slop"
homepage = "https://docs.slopai.dev/api/rust"
documentation = "https://docs.rs/slop-ai"
keywords = ["slop", "ai", "state", "protocol", "llm"]
categories = ["api-bindings", "network-programming"]

[features]
default = ["native"]
native = ["websocket", "unix", "stdio"]
websocket = ["dep:tokio", "dep:tokio-tungstenite", "dep:futures-util"]
unix = ["dep:tokio"]
stdio = ["dep:tokio"]
axum = ["dep:axum", "dep:tokio"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"

# Optional — pulled by feature flags
tokio = { version = "1", features = ["rt", "io-util", "io-std", "net", "sync", "macros", "rt-multi-thread"], optional = true }
tokio-tungstenite = { version = "0.26", optional = true }
futures-util = { version = "0.3", optional = true }
axum = { version = "0.8", features = ["ws"], optional = true }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
serde_json = "1"
