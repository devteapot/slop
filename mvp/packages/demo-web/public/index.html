<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLOP Kanban Board</title>
<meta name="slop" content="ws://localhost:3737/slop">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
  }
  .connected { background: #238636; color: #fff; }
  .disconnected { background: #da3633; color: #fff; }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Board */
  .board {
    flex: 1;
    display: flex;
    gap: 16px;
    padding: 20px;
    overflow-x: auto;
  }
  .column {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    min-width: 280px;
    flex: 1;
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 70px);
  }
  .column-header {
    padding: 12px 16px;
    font-weight: 600;
    font-size: 14px;
    border-bottom: 1px solid #30363d;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .column-header .count {
    background: #30363d;
    color: #8b949e;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 400;
  }
  .column-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    min-height: 60px;
  }
  .column-body.drag-over {
    background: rgba(56, 139, 253, 0.08);
    border-radius: 0 0 8px 8px;
  }

  /* Cards */
  .card {
    background: #1c2028;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 8px;
    cursor: grab;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
  }
  .card:hover { border-color: #58a6ff; }
  .card.dragging { opacity: 0.4; }
  .card-color {
    width: 32px;
    height: 4px;
    border-radius: 2px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 12px;
    color: #8b949e;
  }
  .card-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: none;
    gap: 4px;
  }
  .card:hover .card-actions { display: flex; }
  .card-btn {
    background: #30363d;
    border: none;
    color: #8b949e;
    width: 24px;
    height: 24px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-btn:hover { background: #484f58; color: #e1e4e8; }
  .card-btn.danger:hover { background: #da3633; color: #fff; }

  /* Add card */
  .add-card-btn {
    background: none;
    border: 1px dashed #30363d;
    color: #8b949e;
    padding: 8px;
    margin: 4px 8px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
  }
  .add-card-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .add-form {
    padding: 8px;
  }
  .add-form input, .add-form textarea {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e1e4e8;
    padding: 8px;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 6px;
  }
  .add-form input:focus, .add-form textarea:focus {
    outline: none;
    border-color: #58a6ff;
  }
  .add-form textarea { resize: vertical; height: 50px; }
  .add-form-actions { display: flex; gap: 6px; }
  .btn {
    padding: 6px 12px;
    border-radius: 4px;
    border: none;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .btn-ghost { background: none; color: #8b949e; }
  .btn-ghost:hover { color: #e1e4e8; }

  /* Activity log */
  .sidebar {
    width: 300px;
    background: #161b22;
    border-left: 1px solid #30363d;
    display: flex;
    flex-direction: column;
  }
  .sidebar h2 {
    font-size: 14px;
    font-weight: 600;
    padding: 14px 16px;
    border-bottom: 1px solid #30363d;
  }
  .activity-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .activity-item {
    padding: 8px;
    border-bottom: 1px solid #21262d;
    font-size: 12px;
    line-height: 1.4;
  }
  .activity-item .source {
    font-weight: 600;
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 6px;
  }
  .source-browser { background: #1f6feb33; color: #58a6ff; }
  .source-agent { background: #23863633; color: #3fb950; }
  .activity-item .time {
    color: #484f58;
    font-size: 11px;
    float: right;
  }

  /* Edit dialog */
  dialog {
    background: #1c2028;
    border: 1px solid #30363d;
    border-radius: 8px;
    color: #e1e4e8;
    padding: 20px;
    min-width: 360px;
  }
  dialog::backdrop { background: rgba(0, 0, 0, 0.6); }
  dialog h3 { margin-bottom: 12px; font-size: 16px; }
  dialog label {
    display: block;
    font-size: 12px;
    color: #8b949e;
    margin-bottom: 4px;
    margin-top: 10px;
  }
  dialog input, dialog textarea {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e1e4e8;
    padding: 8px;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
  }
  dialog textarea { resize: vertical; height: 60px; }
  dialog .dialog-actions {
    margin-top: 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
</style>
</head>
<body>
<header>
  <h1>SLOP Kanban Board</h1>
  <span id="status" class="badge disconnected">Disconnected</span>
</header>

<div class="layout">
  <main class="board" id="board"></main>
  <aside class="sidebar">
    <h2>Activity</h2>
    <div class="activity-list" id="activity"></div>
  </aside>
</div>

<dialog id="editDialog">
  <h3>Edit Card</h3>
  <input type="hidden" id="editCardId">
  <label>Title</label>
  <input type="text" id="editTitle">
  <label>Description</label>
  <textarea id="editDesc"></textarea>
  <label>Color</label>
  <input type="color" id="editColor" style="height:36px;padding:2px;">
  <div class="dialog-actions">
    <button class="btn btn-ghost" onclick="document.getElementById('editDialog').close()">Cancel</button>
    <button class="btn btn-primary" onclick="saveEdit()">Save</button>
  </div>
</dialog>

<script>
  let ws;
  let board = null;
  let dragCardId = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.onopen = () => {
      document.getElementById('status').textContent = 'Connected';
      document.getElementById('status').className = 'badge connected';
    };

    ws.onclose = () => {
      document.getElementById('status').textContent = 'Disconnected';
      document.getElementById('status').className = 'badge disconnected';
      setTimeout(connect, 2000);
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') {
        board = msg.board;
        render();
      } else if (msg.type === 'activity') {
        addActivity(msg.source, msg.message, msg.time);
      }
    };
  }

  function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  // --- Rendering ---

  function render() {
    if (!board) return;
    const el = document.getElementById('board');
    el.innerHTML = board.columns.map(col => `
      <div class="column" data-col="${col.id}">
        <div class="column-header">
          <span>${col.label}</span>
          <span class="count">${col.cards.length}</span>
        </div>
        <div class="column-body"
             ondragover="onDragOver(event)"
             ondragleave="onDragLeave(event)"
             ondrop="onDrop(event, '${col.id}')"
             data-col="${col.id}">
          ${col.cards.map(card => renderCard(card)).join('')}
        </div>
        <div class="add-form" id="form-${col.id}" style="display:none">
          <input type="text" id="input-${col.id}" placeholder="Card title..." onkeydown="if(event.key==='Enter')submitCard('${col.id}');if(event.key==='Escape')hideForm('${col.id}')">
          <div class="add-form-actions">
            <button class="btn btn-primary" onclick="submitCard('${col.id}')">Add</button>
            <button class="btn btn-ghost" onclick="hideForm('${col.id}')">Cancel</button>
          </div>
        </div>
        <button class="add-card-btn" id="addbtn-${col.id}" onclick="showForm('${col.id}')">+ Add a card</button>
      </div>
    `).join('');
  }

  function renderCard(card) {
    return `
      <div class="card" draggable="true"
           ondragstart="onDragStart(event, '${card.id}')"
           ondragend="onDragEnd(event)"
           id="card-${card.id}">
        <div class="card-actions">
          <button class="card-btn" onclick="openEdit('${card.id}')" title="Edit">&#9998;</button>
          <button class="card-btn danger" onclick="deleteCard('${card.id}')" title="Delete">&times;</button>
        </div>
        <div class="card-color" style="background:${card.color}"></div>
        <div class="card-title">${esc(card.title)}</div>
        ${card.description ? `<div class="card-desc">${esc(card.description)}</div>` : ''}
      </div>
    `;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // --- Drag and drop ---

  function onDragStart(e, cardId) {
    dragCardId = cardId;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd(e) {
    e.target.classList.remove('dragging');
    dragCardId = null;
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }

  function onDragOver(e) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over');
  }

  function onDragLeave(e) {
    e.currentTarget.classList.remove('drag-over');
  }

  function onDrop(e, columnId) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (dragCardId) {
      send({ type: 'move_card', cardId: dragCardId, toColumnId: columnId });
    }
  }

  // --- Add card ---

  function showForm(colId) {
    document.getElementById('form-' + colId).style.display = 'block';
    document.getElementById('addbtn-' + colId).style.display = 'none';
    document.getElementById('input-' + colId).focus();
  }

  function hideForm(colId) {
    document.getElementById('form-' + colId).style.display = 'none';
    document.getElementById('addbtn-' + colId).style.display = 'block';
    document.getElementById('input-' + colId).value = '';
  }

  function submitCard(colId) {
    const input = document.getElementById('input-' + colId);
    const title = input.value.trim();
    if (!title) return;
    send({ type: 'add_card', columnId: colId, title });
    hideForm(colId);
  }

  // --- Edit card ---

  function openEdit(cardId) {
    const card = findCard(cardId);
    if (!card) return;
    document.getElementById('editCardId').value = cardId;
    document.getElementById('editTitle').value = card.title;
    document.getElementById('editDesc').value = card.description || '';
    document.getElementById('editColor').value = card.color || '#4a9eff';
    document.getElementById('editDialog').showModal();
  }

  function saveEdit() {
    const cardId = document.getElementById('editCardId').value;
    const title = document.getElementById('editTitle').value.trim();
    const description = document.getElementById('editDesc').value.trim();
    const color = document.getElementById('editColor').value;
    if (!title) return;
    send({ type: 'edit_card', cardId, title, description, color });
    document.getElementById('editDialog').close();
  }

  function deleteCard(cardId) {
    send({ type: 'delete_card', cardId });
  }

  function findCard(cardId) {
    if (!board) return null;
    for (const col of board.columns) {
      const card = col.cards.find(c => c.id === cardId);
      if (card) return card;
    }
    return null;
  }

  // --- Activity log ---

  function addActivity(source, message, time) {
    const el = document.getElementById('activity');
    const t = new Date(time).toLocaleTimeString();
    const cls = source === 'agent' ? 'source-agent' : 'source-browser';
    const label = source === 'agent' ? 'AI' : 'You';
    const item = document.createElement('div');
    item.className = 'activity-item';
    item.innerHTML = `<span class="time">${t}</span><span class="source ${cls}">${label}</span>${esc(message)}`;
    el.prepend(item);
  }

  // --- Start ---
  connect();
</script>
</body>
</html>
