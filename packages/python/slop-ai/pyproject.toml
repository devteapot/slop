[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "slop-ai"
version = "0.1.0"
description = "Python SDK for the SLOP protocol — let AI observe and interact with your app's state"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []
keywords = ["slop", "ai", "state", "protocol", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

[project.optional-dependencies]
websocket = ["websockets>=12.0"]
all = ["websockets>=12.0"]

[project.urls]
Homepage = "https://slopai.dev"
Repository = "https://github.com/slop-ai/slop"
Documentation = "https://slopai.dev/guides/python"

[tool.hatch.build.targets.wheel]
packages = ["src/slop"]

[tool.pytest.ini_options]
testpaths = ["tests"]
