name: Main Preflight

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript-packages:
    name: TypeScript Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build publishable TypeScript packages
        run: bun run build

      - name: Run TypeScript package tests
        run: bun run test

  extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck extension
        working-directory: apps/extension
        run: bun run typecheck

      - name: Build extension
        working-directory: apps/extension
        run: bun run build

  desktop-macos:
    name: Desktop macOS Smoke Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck desktop frontend
        working-directory: apps/desktop
        run: bun run typecheck

      - name: Build desktop app bundle without signing
        working-directory: apps/desktop
        run: bunx tauri build --no-sign --bundles app

  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python SDK test dependencies
        run: python -m pip install -e "packages/python/slop-ai[all]"

      - name: Run Python SDK tests
        run: python -m pytest packages/python/slop-ai/tests

  rust-sdk:
    name: Rust SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust SDK tests
        working-directory: packages/rust/slop-ai
        run: cargo test

  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/slop-ai/go.mod

      - name: Run Go SDK tests
        working-directory: packages/go/slop-ai
        run: go test ./...
