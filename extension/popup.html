<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e1e4e8;
    width: 280px; padding: 16px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header .version { font-size: 11px; color: #6e7681; }

  .master-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; margin-bottom: 12px;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
  }
  .master-row .toggle-label { font-size: 14px; font-weight: 600; }

  .sub-toggles { }
  .sub-toggles.disabled { opacity: 0.4; pointer-events: none; }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0;
  }
  .toggle-row + .toggle-row { border-top: 1px solid #21262d; }
  .toggle-label { font-size: 13px; }
  .toggle-desc { font-size: 11px; color: #6e7681; margin-top: 2px; }

  .switch {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0; background: #30363d; border-radius: 10px;
    cursor: pointer; transition: background 0.2s;
  }
  .slider::before {
    content: ""; position: absolute; width: 16px; height: 16px;
    left: 2px; bottom: 2px; background: #e1e4e8; border-radius: 50%;
    transition: transform 0.2s;
  }
  input:checked + .slider { background: #238636; }
  input:checked + .slider::before { transform: translateX(16px); }

  .link-row {
    margin-top: 10px; padding-top: 10px; border-top: 1px solid #30363d;
  }
  .link-row a {
    display: block; color: #58a6ff; text-decoration: none; font-size: 13px;
    padding: 4px 0; cursor: pointer;
  }
  .link-row a:hover { text-decoration: underline; }

  .scan-section {
    margin-bottom: 12px; padding: 10px 12px;
    background: #161b22; border-radius: 8px;
  }
  .scan-status {
    font-size: 12px; color: #8b949e; margin-bottom: 8px;
  }
  .scan-status .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
  }
  .dot.green { background: #3fb950; }
  .dot.yellow { background: #d29922; }
  .dot.gray { background: #6e7681; }
  .scan-btn {
    width: 100%; padding: 8px; border: none; border-radius: 6px;
    font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .scan-btn.start { background: #238636; color: #fff; }
  .scan-btn.start:hover { background: #2ea043; }
  .scan-btn.stop { background: #30363d; color: #8b949e; }
  .scan-btn.stop:hover { background: #484f58; color: #e1e4e8; }
</style>
</head>
<body>
<div class="header">
  <h1>SLOP</h1>
  <span class="version">v0.1.0</span>
</div>

<div class="master-row">
  <div class="toggle-label">Active</div>
  <label class="switch">
    <input type="checkbox" id="activeToggle">
    <span class="slider"></span>
  </label>
</div>

<div id="scanSection" class="scan-section" style="display:none">
  <div id="scanStatus" class="scan-status"></div>
  <button id="scanBtn" class="scan-btn">Scan this page</button>
</div>

<div class="sub-toggles" id="subToggles">
  <div class="toggle-row">
    <div>
      <div class="toggle-label">Chat overlay</div>
      <div class="toggle-desc">Show floating chat on pages</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="chatToggle">
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div>
      <div class="toggle-label">Desktop bridge</div>
      <div class="toggle-desc">Connect to SLOP Desktop app</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="bridgeToggle">
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="link-row">
  <a id="settingsLink">LLM Settings &rarr;</a>
</div>

<script src="dist/popup.js"></script>
</body>
</html>
