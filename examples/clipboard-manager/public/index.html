<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipboard Manager</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 12px;
    font-weight: 500;
    background: #238636;
    color: #fff;
  }
  .count { color: #8b949e; font-size: 13px; }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .toolbar {
    padding: 8px 16px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .toolbar input {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #e1e4e8;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: inherit;
    outline: none;
  }
  .toolbar input:focus { border-color: #58a6ff; }
  .toolbar button {
    background: none;
    border: 1px solid #30363d;
    color: #8b949e;
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
  }
  .toolbar button:hover { border-color: #58a6ff; color: #e1e4e8; }
  .toolbar button.danger:hover { border-color: #da3633; color: #da3633; }

  .entries {
    flex: 1;
    overflow-y: auto;
    padding: 8px 16px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    color: #8b949e;
    letter-spacing: 0.5px;
    margin: 12px 0 6px;
  }
  .section-title:first-child { margin-top: 4px; }

  .entry {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: #1c2028;
    border: 1px solid #30363d;
    border-radius: 6px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .entry:hover { border-color: #58a6ff; }
  .entry.favorite { border-left: 3px solid #d29922; padding-left: 9px; }

  .entry .text {
    flex: 1;
    font-size: 13px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 60px;
    overflow: hidden;
  }

  .entry .meta {
    font-size: 10px;
    color: #6e7681;
    margin-top: 2px;
  }

  .entry-actions {
    display: none;
    gap: 4px;
    flex-shrink: 0;
  }
  .entry:hover .entry-actions { display: flex; }

  .entry-btn {
    background: #30363d;
    border: none;
    color: #8b949e;
    width: 26px;
    height: 26px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .entry-btn:hover { background: #484f58; color: #e1e4e8; }
  .entry-btn.danger:hover { background: #da3633; color: #fff; }
  .entry-btn.fav:hover { background: #9e6a03; color: #fff; }

  .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #6e7681;
    font-size: 13px;
  }

  /* Activity sidebar */
  .sidebar {
    width: 220px;
    background: #161b22;
    border-left: 1px solid #30363d;
    display: flex;
    flex-direction: column;
  }
  .sidebar h2 {
    font-size: 13px;
    font-weight: 600;
    padding: 12px 14px;
    border-bottom: 1px solid #30363d;
  }
  .activity-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .activity-item {
    padding: 6px;
    border-bottom: 1px solid #21262d;
    font-size: 11px;
    line-height: 1.3;
  }
  .source {
    font-weight: 600;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .source-browser { background: #1f6feb33; color: #58a6ff; }
  .source-agent { background: #23863633; color: #3fb950; }
  .time { color: #484f58; font-size: 10px; float: right; }
</style>
</head>
<body>

<header>
  <h1>Clipboard Manager</h1>
  <div>
    <span class="count" id="count">0 entries</span>
    <span class="badge">Unix Socket</span>
  </div>
</header>

<div class="layout">
  <div class="main">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search clipboard history...">
      <button class="danger" onclick="clearAll()">Clear All</button>
    </div>
    <div class="entries" id="entries">
      <div class="empty">Clipboard history will appear here. Copy something!</div>
    </div>
  </div>
  <aside class="sidebar">
    <h2>Activity</h2>
    <div class="activity-list" id="activity"></div>
  </aside>
</div>

<script>
  let state = null;
  let searchTerm = "";

  window.api.getState().then(s => {
    state = s;
    render();
  });

  window.api.onStateUpdate(s => {
    state = s;
    render();
  });

  window.api.onActivity(a => {
    addActivityItem(a.source, a.message, a.time);
  });

  document.getElementById("search").addEventListener("input", e => {
    searchTerm = e.target.value.toLowerCase();
    render();
  });

  function render() {
    if (!state) return;
    const countEl = document.getElementById("count");
    countEl.textContent = state.entries.length + " entries";

    const el = document.getElementById("entries");
    let entries = state.entries;
    if (searchTerm) {
      entries = entries.filter(e => e.text.toLowerCase().includes(searchTerm));
    }

    if (entries.length === 0) {
      el.innerHTML = '<div class="empty">' +
        (searchTerm ? "No matches found" : "Clipboard history will appear here. Copy something!") +
        '</div>';
      return;
    }

    const favs = entries.filter(e => e.favorite);
    const recent = entries.filter(e => !e.favorite);

    let html = "";
    if (favs.length > 0) {
      html += '<div class="section-title">Favorites</div>';
      html += favs.map(renderEntry).join("");
    }
    if (recent.length > 0) {
      html += '<div class="section-title">Recent</div>';
      html += recent.map(renderEntry).join("");
    }
    el.innerHTML = html;
  }

  function renderEntry(entry) {
    const time = new Date(entry.created).toLocaleTimeString();
    const chars = entry.text.length;
    return `
      <div class="entry${entry.favorite ? " favorite" : ""}" onclick="copyEntry('${entry.id}')">
        <div>
          <div class="text">${esc(entry.preview)}</div>
          <div class="meta">${chars} chars &middot; ${time}</div>
        </div>
        <div class="entry-actions">
          <button class="entry-btn fav" title="${entry.favorite ? 'Unfavorite' : 'Favorite'}"
                  onclick="event.stopPropagation();toggleFav('${entry.id}','${entry.favorite ? "unfavorite" : "favorite"}')">${entry.favorite ? "★" : "☆"}</button>
          <button class="entry-btn danger" title="Delete"
                  onclick="event.stopPropagation();deleteEntry('${entry.id}')">&times;</button>
        </div>
      </div>
    `;
  }

  function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }

  function copyEntry(id) {
    window.api.send({ type: "copy_to_clipboard", entryId: id });
  }

  function toggleFav(id, action) {
    window.api.send({ type: action, entryId: id });
  }

  function deleteEntry(id) {
    window.api.send({ type: "delete", entryId: id });
  }

  function clearAll() {
    if (state && state.entries.length > 0) {
      window.api.send({ type: "clear_history" });
    }
  }

  function addActivityItem(source, message, time) {
    const el = document.getElementById("activity");
    const t = new Date(time).toLocaleTimeString();
    const cls = source === "agent" ? "source-agent" : "source-browser";
    const label = source === "agent" ? "AI" : "You";
    const item = document.createElement("div");
    item.className = "activity-item";
    item.innerHTML = `<span class="time">${t}</span><span class="source ${cls}">${label}</span>${esc(message)}`;
    el.prepend(item);
  }
</script>
</body>
</html>
